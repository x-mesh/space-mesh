name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' core/Cargo.toml | head -n1)"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"

      - name: Test Rust workspace
        run: make core-test

      - name: Build app bundle
        env:
          ARCH: ${{ matrix.arch }}
        run: make package

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: space-mesh-${{ matrix.arch }}
          path: dist/space-mesh-macos-*.zip
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --clobber dist/space-mesh-macos-*.zip
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "space-mesh ${GITHUB_REF_NAME#v}" \
              --generate-notes \
              dist/space-mesh-macos-*.zip
          fi

      - name: Generate Homebrew cask
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/update-homebrew-cask.sh \
            "$VERSION" \
            "dist/space-mesh-macos-$VERSION-arm64.zip" \
            "dist/space-mesh-macos-$VERSION-x86_64.zip" \
            "dist/space-mesh.rb"

      - name: Update x-mesh Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$TAP_TOKEN"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/x-mesh/homebrew-tap.git" tap
          install -m 644 dist/space-mesh.rb tap/Casks/space-mesh.rb
          git -C tap add Casks/space-mesh.rb
          if git -C tap diff --cached --quiet; then
            echo "Homebrew cask is already current"
            exit 0
          fi
          git -C tap -c user.name="space-mesh release bot" \
            -c user.email="noreply@x-mesh.dev" \
            commit -m "space-mesh ${GITHUB_REF_NAME#v}"
          git -C tap push origin main
